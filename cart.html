<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sepet — AEDRIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #FFFFFF;
    --bg: #FFFFFF;
    --cream: #FBF9F4;
    --cream-soft: #F6F1E4;
    --olive-dark: #353D1F;
    --olive: #6E7E3E;
    --olive-soft: #87964F;
    --earth: #9A6B43;
    --line: rgba(53,61,31,0.10);
    --r-md: 22px;
    --r-lg: 32px;
    --r-pill: 999px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--olive-dark); -webkit-font-smoothing: antialiased; }
  h1, h2, h3 { font-family: 'Fraunces', serif; font-weight: 500; }
  a { text-decoration: none; color: inherit; }

  /* ---- Navbar (index.html ile birebir aynı) ---- */
  .navbar {
    position: sticky; top: 0; z-index: 20; height: 76px;
    display: flex; align-items: center; gap: 32px; padding: 0 8%;
    background: rgba(255,255,255,0.88); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .navbar .logo { margin-right: auto; font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; letter-spacing: 0.5px; }
  .navbar nav { display: flex; gap: 32px; }
  .navbar nav a { font-size: 14px; letter-spacing: 0.3px; transition: color .2s; }
  .navbar nav a:hover { color: var(--earth); }
  .menu-toggle { display: none; background: none; border: none; cursor: pointer; color: var(--olive-dark); padding: 4px; }
  .cart-btn {
    position: relative; display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; color: var(--olive-dark);
    padding: 4px; text-decoration: none; transition: color .2s;
  }
  .cart-btn svg { width: 24px; height: 24px; }
  .cart-badge {
    position: absolute; top: -5px; right: -5px; background: var(--earth); color: #fff;
    font-size: 11px; font-weight: 600; line-height: 1; min-width: 18px; height: 18px;
    border-radius: var(--r-pill); display: flex; align-items: center; justify-content: center; padding: 0 4px;
  }
  .cart-badge[hidden] { display: none; }

  /* ---- Mobil menü ---- */
  .mobile-menu {
    position: fixed; top: 0; left: 0; bottom: 0; width: 78%; max-width: 320px;
    background: var(--white); z-index: 40; padding: 90px 32px 32px;
    transform: translateX(-100%); transition: transform .35s ease;
    box-shadow: 8px 0 40px rgba(53,61,31,0.12);
    display: flex; flex-direction: column; gap: 8px;
  }
  .mobile-menu.open { transform: translateX(0); }
  .mobile-menu a { font-family: 'Fraunces', serif; font-size: 22px; padding: 14px 0; border-bottom: 1px solid var(--line); }
  .mobile-menu .close-btn { position: absolute; top: 24px; right: 28px; background: none; border: none; cursor: pointer; color: var(--olive-dark); }
  .menu-overlay { position: fixed; inset: 0; background: rgba(40,46,24,0.4); z-index: 35; opacity: 0; visibility: hidden; transition: opacity .35s, visibility .35s; }
  .menu-overlay.open { opacity: 1; visibility: visible; }

  /* ---- Sepet içeriği ---- */
  .cart-page { max-width: 860px; margin: 0 auto; padding: 64px 5%; min-height: 70vh; }
  .cart-page h1 { font-size: clamp(32px, 5vw, 48px); margin-bottom: 48px; }

  /* Boş sepet */
  .empty-state { text-align: center; padding: 80px 0; }
  .empty-state svg { width: 72px; height: 72px; color: var(--line); margin: 0 auto 24px; display: block; }
  .empty-state h2 { font-size: 26px; margin-bottom: 12px; }
  .empty-state p { color: rgba(53,61,31,0.6); margin-bottom: 32px; }

  /* Dolu sepet */
  .cart-items { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }
  .cart-item {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 20px 24px; background: var(--cream); border-radius: var(--r-md);
    border: 1px solid var(--line);
  }
  .cart-item-info { flex: 1; }
  .cart-item-info h3 { font-size: 18px; margin-bottom: 4px; }
  .cart-item-info span { font-size: 14px; color: rgba(53,61,31,0.6); }
  .cart-item-controls { display: flex; align-items: center; gap: 12px; }
  .qty-btn {
    width: 32px; height: 32px; border-radius: var(--r-pill);
    border: 1.5px solid var(--line); background: var(--white);
    cursor: pointer; font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s, background .2s;
  }
  .qty-btn:hover { border-color: var(--olive); background: var(--cream); }
  .qty-display { font-size: 16px; font-weight: 500; min-width: 24px; text-align: center; }
  .item-total { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; min-width: 80px; text-align: right; }
  .remove-btn { background: none; border: none; cursor: pointer; color: rgba(53,61,31,0.4); padding: 4px; transition: color .2s; }
  .remove-btn:hover { color: var(--earth); }

  .cart-summary {
    border-top: 1.5px solid var(--line); padding-top: 28px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;
  }
  .cart-total { font-family: 'Fraunces', serif; font-size: 28px; }
  .cart-total span { font-size: 15px; font-family: 'Inter', sans-serif; color: rgba(53,61,31,0.6); margin-right: 8px; }

  /* Buton */
  .btn {
    display: inline-block; background: var(--olive); color: var(--cream);
    padding: 15px 38px; border-radius: var(--r-pill);
    font-size: 14px; letter-spacing: 0.5px; font-weight: 500; font-family: 'Inter', sans-serif;
    border: none; cursor: pointer; transition: background .25s, transform .25s; text-align: center;
  }
  .btn:hover { background: var(--earth); transform: translateY(-2px); }

  @media (max-width: 820px) {
    .navbar { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; padding: 0 5%; }
    .menu-toggle { display: flex; align-items: center; order: 1; justify-self: start; }
    .navbar .logo { order: 2; margin-right: 0; text-align: center; }
    .navbar nav { display: none; }
    .cart-btn { order: 3; justify-self: end; }
  }
  @media (max-width: 560px) {
    .cart-item { flex-wrap: wrap; }
    .item-total { text-align: left; }
    .cart-summary { flex-direction: column; align-items: flex-start; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>

<header class="navbar">
  <button class="menu-toggle" id="menuToggle" aria-label="Menüyü aç">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="16" x2="21" y2="16"/></svg>
  </button>
  <a href="index.html" class="logo">AEDRIA</a>
  <nav>
    <a href="index.html#hikayemiz">Hikayemiz</a>
    <a href="index.html#urunler">Ürünler</a>
    <a href="index.html#iletisim">İletişim</a>
  </nav>
  <a href="cart.html" class="cart-btn" id="cartBtn" aria-label="Sepet">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <span class="cart-badge" id="cartBadge" hidden>0</span>
  </a>
</header>

<div class="menu-overlay" id="menuOverlay"></div>
<nav class="mobile-menu" id="mobileMenu" aria-label="Mobil menü">
  <button class="close-btn" id="menuClose" aria-label="Menüyü kapat">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
  </button>
  <a href="index.html#ana-sayfa">Ana Sayfa</a>
  <a href="index.html#hikayemiz">Hikayemiz</a>
  <a href="index.html#urunler">Ürünler</a>
  <a href="index.html#iletisim">İletişim</a>
</nav>

<main class="cart-page">
  <h1>Sepetim</h1>
  <div id="cartContent"></div>
</main>

<script>
  /* ---- Mobil menü ---- */
  const menuToggle  = document.getElementById('menuToggle');
  const menuClose   = document.getElementById('menuClose');
  const mobileMenu  = document.getElementById('mobileMenu');
  const menuOverlay = document.getElementById('menuOverlay');
  menuToggle.addEventListener('click', () => { mobileMenu.classList.add('open'); menuOverlay.classList.add('open'); });
  menuClose.addEventListener('click',  () => { mobileMenu.classList.remove('open'); menuOverlay.classList.remove('open'); });
  menuOverlay.addEventListener('click',() => { mobileMenu.classList.remove('open'); menuOverlay.classList.remove('open'); });

  /* ---- Sepet ---- */
  let cart = JSON.parse(sessionStorage.getItem('aedria-cart') || '[]');

  function saveCart() { sessionStorage.setItem('aedria-cart', JSON.stringify(cart)); }

  function updateBadge() {
    const badge = document.getElementById('cartBadge');
    const total = cart.reduce((s, i) => s + i.qty, 0);
    if (total > 0) { badge.textContent = total; badge.removeAttribute('hidden'); }
    else { badge.setAttribute('hidden', ''); }
  }

  function calcTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }

  function render() {
    const el = document.getElementById('cartContent');
    if (cart.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <h2>Sepetiniz boş</h2>
          <p>Henüz hiçbir ürün eklemediniz.</p>
          <a href="index.html#urunler" class="btn">Alışverişe Başla</a>
        </div>`;
      return;
    }

    const itemsHtml = cart.map((item, idx) => `
      <div class="cart-item">
        <div class="cart-item-info">
          <h3>${item.name}</h3>
          <span>${item.price} TL / adet</span>
        </div>
        <div class="cart-item-controls">
          <button class="qty-btn" data-idx="${idx}" data-action="dec">−</button>
          <span class="qty-display">${item.qty}</span>
          <button class="qty-btn" data-idx="${idx}" data-action="inc">+</button>
        </div>
        <div class="item-total">${item.price * item.qty} TL</div>
        <button class="remove-btn" data-idx="${idx}" aria-label="${item.name} kaldır">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`).join('');

    el.innerHTML = `
      <div class="cart-items">${itemsHtml}</div>
      <div class="cart-summary">
        <div class="cart-total"><span>Toplam</span>${calcTotal()} TL</div>
        <a href="#" class="btn">Ödemeye Geç</a>
      </div>`;

    el.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        if (btn.dataset.action === 'inc') { cart[idx].qty++; }
        else { cart[idx].qty--; if (cart[idx].qty <= 0) cart.splice(idx, 1); }
        saveCart(); updateBadge(); render();
      });
    });
    el.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        cart.splice(parseInt(btn.dataset.idx), 1);
        saveCart(); updateBadge(); render();
      });
    });
  }

  updateBadge();
  render();
</script>
</body>
</html>
